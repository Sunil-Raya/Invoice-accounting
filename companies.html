<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Companies Management">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/companies.css">
    <link rel="stylesheet" href="css/form.css">
    <title>Companies</title>
</head>
<body>
    <!-- Modal Backdrop -->
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <!-- Add Company Modal -->
    <div class="modal" id="addCompanyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Company</h2>
                <button class="close-btn" id="closeModal" type="button">&times;</button>
            </div>
            <form id="addCompanyForm" class="form-container">
                <div class="form-group">
                    <label for="companyName">Company Name *</label>
                    <input type="text" id="companyName" name="companyName" placeholder="Enter company name" required>
                </div>
                <div class="form-group">
                    <label for="companyEmail">Email</label>
                    <input type="email" id="companyEmail" name="companyEmail" placeholder="Enter email address">
                </div>
                <div class="form-group">
                    <label for="companyPhone">Phone</label>
                    <input type="tel" id="companyPhone" name="companyPhone" placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label for="companyAddress">Address</label>
                    <textarea id="companyAddress" name="companyAddress" placeholder="Enter address" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Company</button>
                </div>
            </form>
        </div>
    </div>

    <div class="companies-container">
        <!-- Header Section -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h1 style="margin: 0; font-size: 1.875rem; font-weight: 700;">Companies</h1>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-field" 
                placeholder="Search companies by name..."
            >
        </div>

        <!-- Companies Grid -->
        <div class="companies-grid" id="companiesGrid">
            <div class="company-card skeleton"></div>
            <div class="company-card skeleton"></div>
            <div class="company-card skeleton"></div>
        </div>
    </div>

</body>
</html>
