<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add Payment">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/form.css">
    <title>Add Payment</title>
</head>
<body>
    <h1 style="margin-bottom: 32px;">Add Payment</h1>
    
    <div class="form-container">
        <form id="paymentForm">
            <div class="form-group">
                <label for="paymentCompany">Company *</label>
                <select id="paymentCompany" name="company" required>
                    <option value="">Select a company</option>
                </select>
            </div>

            <div class="form-group row">
                <div class="form-group">
                    <label for="paymentAmount">Payment Amount *</label>
                    <input type="number" id="paymentAmount" name="amount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="paymentDate">Date *</label>
                    <input type="date" id="paymentDate" name="date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="paymentMethod">Payment Method</label>
                <select id="paymentMethod" name="method">
                    <option value="">Select method</option>
                    <option value="cash">Cash</option>
                    <option value="check">Check</option>
                    <option value="transfer">Bank Transfer</option>
                    <option value="card">Card</option>
                </select>
            </div>

            <div class="form-group">
                <label for="paymentReference">Reference / Check Number</label>
                <input type="text" id="paymentReference" name="reference" placeholder="Enter reference number">
            </div>

            <div class="form-group">
                <label for="paymentNotes">Notes</label>
                <textarea id="paymentNotes" name="notes" placeholder="Enter payment notes..."></textarea>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn btn-secondary">Clear</button>
                <button type="submit" class="btn btn-primary">Record Payment</button>
            </div>
        </form>
    </div>

    <script src="js/payments.js"></script>
</body>
</html>
